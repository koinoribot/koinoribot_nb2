name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate SonarQube configuration
        shell: bash
        env:
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -z "$SONAR_HOST_URL" ]; then
            echo "::error::SONAR_HOST_URL is empty"
            exit 1
          fi

          case "$SONAR_HOST_URL" in
            http://*|https://*) ;;
            *)
              echo "::error::SONAR_HOST_URL must start with http:// or https://"
              exit 1
              ;;
          esac

          if [ -z "$SONAR_TOKEN" ]; then
            echo "::error::SONAR_TOKEN is empty"
            exit 1
          fi

          echo "SonarQube URL is configured: $SONAR_HOST_URL"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
